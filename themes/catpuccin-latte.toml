[dark.background]
main =  "#eff1f5"  # Main background
alt =  "#d9e2ec"  # Secondary background
dark =  "#c1c9d4"  # Darkest background


[dark.text]
main =  "#4c4f69"  # Primary text color
secondary =  "#5b6078"  # Secondary text color
muted =  "#74788b"  # Tertiary text, muted
disabled =  "#b3b9d1"  # Text for disabled elements
muted_light =  "#a8b0c2"  # Light-muted text for hints
muted_dark =  "#9298a7"  # Dark-muted text


[dark.surface]
disabled =  "#e1e8f0"  # Background for disabled items
neutral =  "#c6d1e6"  # Neutral surface for cards, panels
highlight =  "#b5c0d1"  # Selection and highlights


[dark.accent]
light =  "#f5e0dc"  # Lightest accent (Rosewater)
pink =  "#f5c2e7"  # Pink accent
purple =  "#cba6f7"  # Mauve accent
red =  "#f38ba8"  # Red for errors and warnings
orange =  "#fab387"  # Orange for warnings and alerts
yellow =  "#f9e2af"  # Yellow for highlights
green =  "#a6e3a1"  # Green for success
teal =  "#94e2d5"  # Teal for information
blue =  "#89b4fa"  # Blue for links and actions
light_blue =  "#89dceb"  # Sky blue accent
lavender =  "#b4befe"  # Lavender for subtle highlights


[dark.general]
bar_background =  "rgba(46, 46, 46, 0.1)"
shadow_color =  "rgba(0, 0, 0, 0.3)"


