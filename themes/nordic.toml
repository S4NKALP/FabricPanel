[background]
main = "#5a7e98"  # Main background (dark slate blue)
alt = "#3a4f66"  # Secondary background (blue-gray)
dark = "#476a84"  # Darkest background (charcoal blue)

[text]
main = "#d9d9d9"  # Primary text color (light icy gray)
secondary = "#d8dee9"  # Secondary text color (cool gray)
muted = "#4c566a"  # Tertiary text, muted (blue-gray)
disabled = "#4c566a"  # Disabled text (grayish blue)
muted_light = "#d8dee9"  # Light-muted text for hints (light gray)
muted_dark = "#3b4252"  # Dark-muted text (grayish blue)

[surface]
disabled = "#434c5e"  # Disabled items (muted dark blue)
neutral = "#3b4252"  # Neutral surface for cards, panels (slate blue)
highlight = "#88c0d0"  # Selection and highlights (icy light blue)

[accent]
light = "#a3be8c"  # Light accent (soft green)
pink = "#bf616a"  # Pink accent (soft red)
purple = "#b48ead"  # Purple accent (lavender)
red = "#bf616a"  # Red for errors and warnings (soft red)
orange = "#d08770"  # Orange for alerts (light orange)
yellow = "#ebcb8b"  # Yellow for highlights (warm yellow)
green = "#a3be8c"  # Green for success (muted green)
teal = "#88c0d0"  # Teal for information (icy teal)
blue = "#5e81ac"  # Blue for links and actions (muted blue)
light_blue = "#81a1c1"  # Sky blue accent (pale blue)
lavender = "#b48ead"  # Lavender for subtle highlights (soft lavender)

[general]
bar_background = "rgba(0, 0, 0, 0.1)"  # Panel background (semi-transparent dark slate)
shadow_color = "rgba(0, 0, 0, 0.4)"  # Shadow color (light shadows)
