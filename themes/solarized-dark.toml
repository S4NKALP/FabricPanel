[colors.background]
main = "#002b36"  # Main background (dark blue-gray)
alt = "#073642"  # Secondary background (slightly lighter dark blue-gray)
dark = "#001b26"  # Darkest background (very deep blue-gray)

[colors.text]
main = "#839496"  # Primary text color (soft gray)
secondary = "#93a1a1"  # Secondary text color (lighter gray with a hint of green)
muted = "#657b83"  # Tertiary text, muted (grayish blue)
disabled = "#586e75"  # Disabled text (muted blue-gray)
muted_light = "#657b83"  # Light-muted text for hints (light grayish blue)
muted_dark = "#073642"  # Dark-muted text (very dark blue-gray)

[colors.surface]
disabled = "#586e75"  # Disabled items (muted blue-gray)
neutral = "#586e75"  # Neutral surface for cards, panels (muted blue-gray)
highlight = "#268bd2"  # Selection and highlights (bright cyan)

[colors.accent]
light = "#2aa198"  # Light accent (teal)
pink = "#d33682"  # Pink accent (vibrant pink)
purple = "#6c71c4"  # Purple accent (soft purple)
red = "#dc322f"  # Red for errors and warnings (vibrant red)
orange = "#cb4b16"  # Orange for alerts (neon orange)
yellow = "#b58900"  # Yellow for highlights (rich yellow)
green = "#859900"  # Green for success (olive green)
teal = "#2aa198"  # Teal for information (bright teal)
blue = "#268bd2"  # Blue for links and actions (bright cyan)
light_blue = "#2aa198"  # Sky blue accent (light teal)
lavender = "#6c71c4"  # Lavender for subtle highlights (soft purple)

[ui]
bar_background = "rgba(0, 43, 54, 0.8)"  # Panel background (semi-transparent dark blue)
shadow_color = "rgba(0, 0, 0, 0.6)"  # Shadow color (soft, dark shadows)
