[background]
main = "#3e4b3b"  # Main background (earthy dark green)
alt = "#5a6e56"  # Secondary background (earthy medium green)
dark = "#2a3626"  # Darkest background (deep brown-green)

[text]
main = "#f0f0f0"  # Primary text color (light ivory)
secondary = "#b0b0b0"  # Secondary text color (soft gray)
muted = "#7f7f7f"  # Tertiary text, muted (earthy gray)
disabled = "#8b8b8b"  # Disabled text (grayish muted)
muted_light = "#b0b0b0"  # Light-muted text for hints (light gray)
muted_dark = "#4f4f4f"  # Dark-muted text (dark gray)

[surface]
disabled = "#a9a9a9"  # Disabled items (grayish earth tone)
neutral = "#7e8a73"  # Neutral surface for cards, panels (greenish gray)
highlight = "#f4a261"  # Selection and highlights (warm golden)

[accent]
light = "#e9c46a"  # Light accent (yellow ochre)
pink = "#f28d87"  # Pink accent (soft coral)
purple = "#9d5b6f"  # Purple accent (muted purple)
red = "#e63946"  # Red for errors and warnings (rust red)
orange = "#f1faee"  # Orange for alerts (soft orange)
yellow = "#f4a261"  # Yellow for highlights (mustard yellow)
green = "#2a9d8f"  # Green for success (earthy green)
teal = "#264653"  # Teal for information (deep teal)
blue = "#1d3557"  # Blue for links and actions (dark blue)
light_blue = "#a8dadc"  # Sky blue accent (light blue)
lavender = "#7a6a93"  # Lavender for subtle highlights (earthy lavender)

[general]
bar_background = "rgba(62, 75, 59, 0.8)"  # Panel background (semi-transparent earthy green)
shadow_color = "rgba(0, 0, 0, 0.5)"  # Shadow color (soft shadow with earthy tone)
