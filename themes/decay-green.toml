[colors.background]
main = "#1a1d22"  # Main background (dark graphite gray)
alt = "#2a2f35"  # Secondary background (lighter graphite gray)
dark = "#101419"  # Darkest background (charcoal gray)

[colors.text]
main = "#93cee9"  # Primary text color (light gray, near white)
secondary = "#b0b6bd"  # Secondary text color (soft medium gray)
muted = "#717b7d"  # Tertiary text, muted (cool gray)
disabled = "#5b6669"  # Disabled text (dark muted gray)
muted_light = "#717b7d"  # Light-muted text for hints (light gray)
muted_dark = "#1e252a"  # Dark-muted text (very dark gray)

[colors.surface]
disabled = "#5b6669"  # Disabled items (muted dark gray)
neutral = "#5b6669"  # Neutral surface for cards, panels (muted gray)
highlight = "#757d84"  # Selection and highlights (subtle cool gray)

[colors.accent]
light = "#8c9e99"  # Light accent (cool gray)
pink = "#f07178"  # Pink accent (soft vibrant pink)
purple = "#9b59b6"  # Purple accent (lavender purple)
red = "#e74c3c"  # Red for errors and warnings (bold red)
orange = "#e67e22"  # Orange for alerts (burnt orange)
yellow = "#f1c40f"  # Yellow for highlights (golden yellow)
green = "#27ae60"  # Green for success (natural green)
teal = "#1abc9c"  # Teal for information (teal-green)
blue = "#3498db"  # Blue for links and actions (cool blue)
light_blue = "#5dade2"  # Sky blue accent (lighter blue)
lavender = "#8e44ad"  # Lavender for subtle highlights (muted purple)

[ui]
bar_background = "rgb(30, 34, 39)"  # Panel background (semi-transparent dark graphite gray)
shadow_color = "rgba(0, 0, 0, 0.5)"  # Shadow color (soft dark gray shadows)
