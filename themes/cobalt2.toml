[dark.background]
main =  "#2d2a4a"  # Main background (dark purple-gray)
alt =  "#23234f"  # Secondary background (darker purple)
dark =  "#1a1a33"  # Darkest background (deep black-purple)


[dark.text]
main =  "#f5f2f0"  # Primary text color (light beige)
secondary =  "#d0d0d0"  # Secondary text color (light gray)
muted =  "#7c7c7c"  # Tertiary text, muted (soft gray)
disabled =  "#6c6c6c"  # Disabled text (gray)
muted_light =  "#999999"  # Light-muted text for hints (light gray)
muted_dark =  "#333333"  # Dark-muted text (very dark gray)


[dark.surface]
disabled =  "#58585a"  # Disabled items (grayish)
neutral =  "#4d4d56"  # Neutral surface for cards, panels (muted gray)
highlight =  "#ffcc00"  # Selection and highlights (vibrant yellow)


[dark.accent]
light =  "#ffdf00"  # Light accent (bright yellow)
pink =  "#d6008c"  # Pink accent (bright fuchsia)
purple =  "#ac61f7"  # Purple accent (vibrant purple)
red =  "#f75e5e"  # Red for errors and warnings (soft red)
orange =  "#f39c12"  # Orange for alerts (yellow-orange)
yellow =  "#f1c40f"  # Yellow for highlights (golden yellow)
green =  "#2ecc71"  # Green for success (neon green)
teal =  "#1abc9c"  # Teal for information (cyan)
blue =  "#3498db"  # Blue for links and actions (bright blue)
light_blue =  "#5dade2"  # Sky blue accent (soft blue)
lavender =  "#9b59b6"  # Lavender for subtle highlights (muted purple)


[dark.general]
bar_background =  "rgba(45, 42, 74, 0.8)"  # Panel background (semi-transparent dark purple)
shadow_color =  "rgba(0, 0, 0, 0.6)"  # Shadow color (dark, soft shadows)


[light.background]
