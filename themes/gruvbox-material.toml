[dark.background]
main =  "#282828"  # Main background (dark brownish-gray)
alt =  "#3c3836"  # Secondary background (slightly darker gray)
dark =  "#1d2021"  # Darkest background (charcoal)


[dark.text]
main =  "#ebdbb2"  # Primary text color (warm off-white)
secondary =  "#d5c4a1"  # Secondary text color (soft beige)
muted =  "#a89984"  # Tertiary text, muted (grayish brown)
disabled =  "#7c6f64"  # Disabled text (dim gray)
muted_light =  "#928374"  # Light-muted text for hints (grayish tan)
muted_dark =  "#3c3836"  # Dark-muted text (dark brown-gray)


[dark.surface]
disabled =  "#7c6f64"  # Disabled items (muted gray)
neutral =  "#504945"  # Neutral surface for cards, panels (dark brown)
highlight =  "#fe8019"  # Selection and highlights (vibrant orange)


[dark.accent]
light =  "#8ec07c"  # Light accent (olive green)
pink =  "#d3869b"  # Pink accent (dusty pink)
purple =  "#b16286"  # Purple accent (deep purple)
red =  "#fb4934"  # Red for errors and warnings (bright red)
orange =  "#fe8019"  # Orange for alerts (vibrant orange)
yellow =  "#fabd2f"  # Yellow for highlights (golden yellow)
green =  "#8ec07c"  # Green for success (green)
teal =  "#8ec07c"  # Teal for information (muted teal)
blue =  "#83a598"  # Blue for links and actions (dusty blue)
light_blue =  "#83a598"  # Sky blue accent (muted blue)
lavender =  "#b16286"  # Lavender for subtle highlights (soft lavender)


[dark.general]
bar_background =  "rgba(40, 40, 40, 0.9)"  # Panel background (semi-transparent brownish-gray)
shadow_color =  "rgba(0, 0, 0, 0.5)"  # Shadow color (soft, dark shadows)


[light.background]
