[background]
main = "#011627"  # Main background (deep navy)
alt = "#1b2b34"  # Secondary background (dark grayish-blue)
dark = "#000a1f"  # Darkest background (almost black with blue tint)

[text]
main = "#d6deeb"  # Primary text color (light bluish-gray)
secondary = "#a0b0b9"  # Secondary text color (soft gray)
muted = "#5f6a79"  # Tertiary text, muted (muted gray-blue)
disabled = "#4f5b66"  # Disabled text (dim gray-blue)
muted_light = "#7d8c97"  # Light-muted text for hints (grayish-blue)
muted_dark = "#263238"  # Dark-muted text (dark grayish-blue)

[surface]
disabled = "#586e75"  # Disabled items (muted teal)
neutral = "#344952"  # Neutral surface for cards, panels (dark slate)
highlight = "#82aaff"  # Selection and highlights (light blue)

[accent]
light = "#61dafb"  # Light accent (cyan)
pink = "#ff79c6"  # Pink accent (vibrant pink)
purple = "#bb80b3"  # Purple accent (soft purple)
red = "#f14c6b"  # Red for errors and warnings (soft red)
orange = "#f78c6c"  # Orange for alerts (soft orange)
yellow = "#f4e287"  # Yellow for highlights (light yellow)
green = "#98c379"  # Green for success (olive green)
teal = "#56b6c2"  # Teal for information (bright cyan)
blue = "#82aaff"  # Blue for links and actions (light blue)
light_blue = "#6a90ff"  # Sky blue accent (light blue)
lavender = "#bb80b3"  # Lavender for subtle highlights (soft lavender)

[general]
bar_background = "rgba(1, 22, 39, 0.85)"  # Panel background (semi-transparent navy)
shadow_color = "rgba(0, 0, 0, 0.5)"  # Shadow color (dark shadows)
