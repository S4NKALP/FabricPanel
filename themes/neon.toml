muted =  "#777777"  # Tertiary text, muted (dark gray)
disabled =  "#bbbbbb"  # Disabled text (dark gray)
muted_light =  "#999999"  # Light-muted text for hints (medium gray)
muted_dark =  "#dddddd"  # Dark-muted text (deep gray)


[light.surface]
