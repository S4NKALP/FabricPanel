[colors.background]
main = "#111111"  # Main background (dark black)
alt = "#222222"  # Secondary background (dark gray)
dark = "#0d0d0d"  # Darkest background (near-black)

[colors.text]
main = "#ffffff"  # Primary text color (pure white)
secondary = "#cccccc"  # Secondary text color (light gray)
muted = "#888888"  # Tertiary text, muted (dark gray)
disabled = "#444444"  # Disabled text (dark gray)
muted_light = "#666666"  # Light-muted text for hints (medium gray)
muted_dark = "#222222"  # Dark-muted text (deep gray)

[colors.surface]
disabled = "#444444"  # Disabled items (gray)
neutral = "#555555"  # Neutral surface for cards, panels (dark gray)
highlight = "#39ff14"  # Selection and highlights (neon green)

[colors.accent]
light = "#ff007f"  # Light accent (neon pink)
pink = "#ff007f"  # Pink accent (neon pink)
purple = "#9b59b6"  # Purple accent (vivid purple)
red = "#ff1744"  # Red for errors and warnings (bright red)
orange = "#ff9100"  # Orange for alerts (neon orange)
yellow = "#ffeb3b"  # Yellow for highlights (neon yellow)
green = "#00ff00"  # Green for success (neon green)
teal = "#00bcd4"  # Teal for information (neon teal)
blue = "#2196f3"  # Blue for links and actions (neon blue)
light_blue = "#00bcd4"  # Sky blue accent (light neon cyan)
lavender = "#9c27b0"  # Lavender for subtle highlights (bright purple)

[ui]
bar_background = "rgba(17, 17, 17, 0.9)"  # Panel background (semi-transparent dark)
shadow_color = "rgba(0, 0, 0, 0.8)"  # Shadow color (strong shadows)
