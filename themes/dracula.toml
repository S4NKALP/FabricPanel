[background]
main = "#282a36"  # Main background (dark, almost black gray)
alt = "#44475a"  # Secondary background (dark gray with purple hue)
dark = "#1e1f29"  # Darkest background (deep, almost black purple)

[text]
main = "#f8f8f2"  # Primary text color (light gray, near white)
secondary = "#b8b8b2"  # Secondary text color (light gray)
muted = "#6272a4"  # Tertiary text, muted (soft bluish-gray)
disabled = "#6272a4"  # Disabled text (muted bluish-gray)
muted_light = "#565761"  # Light-muted text for hints (grayish)
muted_dark = "#44475a"  # Dark-muted text (dark purple-gray)

[surface]
disabled = "#6272a4"  # Disabled items (muted purple-gray)
neutral = "#44475a"  # Neutral surface for cards, panels (dark gray with purple undertone)
highlight = "#50fa7b"  # Selection and highlights (neon green)

[accent]
light = "#8be9fd"  # Light accent (bright cyan)
pink = "#ff79c6"  # Pink accent (neon pink)
purple = "#bd93f9"  # Purple accent (soft, glowing purple)
red = "#ff5555"  # Red for errors and warnings (bright red)
orange = "#ffb86c"  # Orange for alerts (bright orange)
yellow = "#f1fa8c"  # Yellow for highlights (neon yellow)
green = "#50fa7b"  # Green for success (vibrant neon green)
teal = "#8be9fd"  # Teal for information (bright cyan)
blue = "#6272a4"  # Blue for links and actions (muted blue)
light_blue = "#8be9fd"  # Sky blue accent (neon cyan)
lavender = "#bd93f9"  # Lavender for subtle highlights (light purple)

[general]
bar_background = "rgba(40, 42, 54, 0.8)"  # Panel background (semi-transparent dark gray)
shadow_color = "rgba(0, 0, 0, 0.6)"  # Shadow color (soft, dark shadows)
