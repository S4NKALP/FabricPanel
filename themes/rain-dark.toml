[dark.background]
main =  "#0a0d12"  # Main background (dark purple with a hint of brown)
alt =  "#1a1c21"  # Secondary background (dark rose with a touch of purple)
dark =  "#050417"  # Darkest background (deep rose-purple)


[dark.text]
main =  "#ffffff"  # Primary text color (soft off-white with a hint of lavender)
secondary =  "#c4b8e3"  # Secondary text color (light lavender-gray)
muted =  "#a89bb9"  # Tertiary text, muted (soft grayish lavender)
disabled =  "#b6a6d3"  # Disabled text (muted lavender-gray)
muted_light =  "#a99bb3"  # Light-muted text for hints (light grayish lavender)
muted_dark =  "#6e5a80"  # Dark-muted text (soft purple-gray)


[dark.surface]
disabled =  "#5c4a7f"  # Disabled items (muted purple)
neutral =  "#3e3658"  # Neutral surface for cards, panels (dark bluish purple)
highlight =  "#eb6f92"  # Selection and highlights (vibrant rose-pink)


[dark.accent]
light =  "#f6a4c5"  # Light accent (soft pastel pink)
pink =  "#eb6f92"  # Pink accent (vibrant rose-pink)
purple =  "#a7b8d4"  # Purple accent (muted lavender)
red =  "#eb6f92"  # Red for errors and warnings (rose-red)
orange =  "#f7b585"  # Orange for alerts (soft peach)
yellow =  "#f1c27d"  # Yellow for highlights (warm soft yellow)
green =  "#8dbe8f"  # Green for success (soft pastel green)
teal =  "#7fb5b5"  # Teal for information (soft teal)
blue =  "#84a0c6"  # Blue for links and actions (soft pastel blue)
light_blue =  "#92a9c6"  # Sky blue accent (light blue)
lavender =  "#c4b8e3"  # Lavender for subtle highlights (muted lavender)


[dark.general]
bar_background =  "rgba(0, 0, 0, 0.2)"  # Panel background (semi-transparent dark purple)
shadow_color =  "rgba(0, 0, 0, 0.6)"  # Shadow color (soft, dark shadows)


[light.background]
