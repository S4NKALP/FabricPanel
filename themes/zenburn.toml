[dark.background]
main =  "#3f3f3f"  # Main background (dark gray with a slight greenish hue)
alt =  "#4e4e4e"  # Secondary background (slightly darker gray)
dark =  "#2e2e2e"  # Darkest background (deep dark gray)


[dark.text]
main =  "#dcdccc"  # Primary text color (light gray)
secondary =  "#b5b5b5"  # Secondary text color (medium gray)
muted =  "#8c8c8c"  # Tertiary text, muted (soft gray)
disabled =  "#6c6c6c"  # Disabled text (gray)
muted_light =  "#7c7c7c"  # Light-muted text for hints (medium gray)
muted_dark =  "#3c3c3c"  # Dark-muted text (charcoal)


[dark.surface]
disabled =  "#707070"  # Disabled items (light gray)
neutral =  "#585858"  # Neutral surface for cards, panels (dark gray)
highlight =  "#a8c0b3"  # Selection and highlights (muted teal)


[dark.accent]
light =  "#dcdccc"  # Light accent (soft gray)
pink =  "#f0f0f0"  # Pink accent (very light gray)
purple =  "#9f7f8d"  # Purple accent (dusty lavender)
red =  "#d75f5f"  # Red for errors and warnings (dusty red)
orange =  "#ffaf00"  # Orange for alerts (yellow-orange)
yellow =  "#d7afaf"  # Yellow for highlights (soft yellow)
green =  "#5f7f5f"  # Green for success (muted green)
teal =  "#8fbc8f"  # Teal for information (muted teal)
blue =  "#87afaf"  # Blue for links and actions (cool grayish blue)
light_blue =  "#87afaf"  # Sky blue accent (soft teal)
lavender =  "#9f7f8d"  # Lavender for subtle highlights (muted lavender)


[dark.general]
bar_background =  "rgba(63, 63, 63, 0.8)"
shadow_color =  "rgba(0, 0, 0, 0.6)"


