muted =  "#a0a0a0"  # Tertiary text, muted (dusty gray)
disabled =  "#939393"  # Disabled text (muted gray)
muted_light =  "#7f7f7f"  # Light-muted text for hints (medium gray)
muted_dark =  "#bbbbbb"  # Dark-muted text (dark gray)


[light.surface]
