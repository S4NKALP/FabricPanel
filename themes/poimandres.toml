[dark.background]
main =  "#1f1f1f"  # Main background (deep charcoal)
alt =  "#252525"  # Secondary background (slightly lighter charcoal)
dark =  "#121212"  # Darkest background (almost black)


[dark.text]
main =  "#eaeaea"  # Primary text color (light gray)
secondary =  "#8d8d8d"  # Secondary text color (gray)
muted =  "#5f5f5f"  # Tertiary text, muted (dusty gray)
disabled =  "#6c6c6c"  # Disabled text (muted gray)
muted_light =  "#808080"  # Light-muted text for hints (medium gray)
muted_dark =  "#444444"  # Dark-muted text (dark gray)


[dark.surface]
disabled =  "#4e4e4e"  # Disabled items (dark gray)
neutral =  "#3e3e3e"  # Neutral surface for cards, panels (darker gray)
highlight =  "#6aa1ff"  # Selection and highlights (light cyan)


[dark.accent]
light =  "#ffb86c"  # Light accent (soft amber)
pink =  "#ff79c6"  # Pink accent (neon pink)
purple =  "#bd93f9"  # Purple accent (light purple)
red =  "#ff5555"  # Red for errors and warnings (bright red)
orange =  "#ffb86c"  # Orange for alerts (light amber)
yellow =  "#f1fa8c"  # Yellow for highlights (pale yellow)
green =  "#50fa7b"  # Green for success (vibrant green)
teal =  "#8be9fd"  # Teal for information (soft cyan)
blue =  "#6272a4"  # Blue for links and actions (muted blue)
light_blue =  "#8be9fd"  # Sky blue accent (soft cyan)
lavender =  "#bd93f9"  # Lavender for subtle highlights (soft purple)


[dark.general]
bar_background =  "rgba(31, 31, 31, 0.8)"  # Panel background (semi-transparent dark)
shadow_color =  "rgba(0, 0, 0, 0.7)"  # Shadow color (soft, dark shadows)


[light.background]
