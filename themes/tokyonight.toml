muted =  "#807372"  # Tertiary text, muted (muted grayish blue)
disabled =  "#aaa399"  # Disabled text (muted bluish-gray)
muted_light =  "#938381"  # Light-muted text for hints (light gray)
muted_dark =  "#b3a79e"  # Dark-muted text (darker bluish-gray)


