[background]
main = "#2a2a3a"  # Main background
alt = "#232436"  # Secondary background
dark = "#1c1c2b"  # Darkest background

[text]
main = "#d8dbe6"  # Primary text color
secondary = "#bbc2d1"  # Secondary text color
muted = "#a1a7b3"  # Tertiary text, muted
disabled = "#7b7f8e"  # Text for disabled elements
muted_light = "#6f7586"  # Light-muted text for hints
muted_dark = "#5a5f6a"  # Dark-muted text

[surface]
disabled = "#4a4e60"  # Background for disabled items
neutral = "#585d71"  # Neutral surface for cards, panels
highlight = "#6a6f83"  # Selection and highlights

[accent]
light = "#f5e0dc"  # Lightest accent (Rosewater)
pink = "#f5c2e7"  # Pink accent
purple = "#cba6f7"  # Mauve accent
red = "#f38ba8"  # Red for errors and warnings
orange = "#fab387"  # Orange for warnings and alerts
yellow = "#f9e2af"  # Yellow for highlights
green = "#a6e3a1"  # Green for success
teal = "#94e2d5"  # Teal for information
blue = "#89b4fa"  # Blue for links and actions
light_blue = "#89dceb"  # Sky blue accent
lavender = "#b4befe"  # Lavender for subtle highlights

[general]
bar_background = "rgba(46, 46, 46, 0.1)"
shadow_color = "rgba(0, 0, 0, 0.4)"
