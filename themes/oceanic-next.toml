[background]
main = "#1b2b34"  # Main background (deep blue-gray)
alt = "#2c3e50"  # Secondary background (dark slate blue)
dark = "#12232e"  # Darkest background (black with a blue tint)

[text]
main = "#d8e0e5"  # Primary text color (light grayish blue)
secondary = "#95a5a6"  # Secondary text color (muted blue-gray)
muted = "#7f8c8d"  # Tertiary text, muted (cool gray)
disabled = "#7f8c8d"  # Disabled text (dim gray)
muted_light = "#95a5a6"  # Light-muted text for hints (light gray)
muted_dark = "#2c3e50"  # Dark-muted text (blue-gray)

[surface]
disabled = "#4e5b6e"  # Disabled items (muted blue-gray)
neutral = "#34495e"  # Neutral surface for cards, panels (dark slate blue)
highlight = "#1abc9c"  # Selection and highlights (bright cyan)

[accent]
light = "#2ecc71"  # Light accent (neon green)
pink = "#f39c12"  # Pink accent (vibrant yellow)
purple = "#9b59b6"  # Purple accent (rich purple)
red = "#e74c3c"  # Red for errors and warnings (bright red)
orange = "#e67e22"  # Orange for alerts (deep orange)
yellow = "#f1c40f"  # Yellow for highlights (warm yellow)
green = "#2ecc71"  # Green for success (vibrant green)
teal = "#1abc9c"  # Teal for information (soft teal)
blue = "#3498db"  # Blue for links and actions (bright blue)
light_blue = "#5dade2"  # Sky blue accent (soft blue)
lavender = "#9b59b6"  # Lavender for subtle highlights (muted purple)

[general]
bar_background = "rgba(27, 43, 52, 0.8)"  # Panel background (semi-transparent dark blue)
shadow_color = "rgba(0, 0, 0, 0.5)"  # Shadow color (soft, dark shadows)
