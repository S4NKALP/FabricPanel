[colors.background]
main = "#282c34"  # Main background
alt = "#353b45"  # Secondary background
dark = "#21252b"  # Darkest background

[colors.text]
main = "#abb2bf"  # Primary text color
secondary = "#5c6370"  # Secondary text color
muted = "#4b5263"  # Tertiary text, muted
disabled = "#5c6370"  # Text for disabled elements
muted_light = "#9ca0a4"  # Light-muted text for hints
muted_dark = "#818896"  # Dark-muted text

[colors.surface]
disabled = "#3e4451"  # Background for disabled items
neutral = "#3e4451"  # Neutral surface for cards, panels
highlight = "#61afef"  # Selection and highlights

[colors.accent]
light = "#ffffff"  # Light accent (white)
pink = "#e06c75"  # Pink accent
purple = "#c678dd"  # Purple accent
red = "#e06c75"  # Red for errors and warnings
orange = "#d19a66"  # Orange for warnings and alerts
yellow = "#e5c07b"  # Yellow for highlights
green = "#98c379"  # Green for success
teal = "#56b6c2"  # Teal for information
blue = "#61afef"  # Blue for links and actions
light_blue = "#8be9fd"  # Sky blue accent
lavender = "#a9a1e1"  # Lavender for subtle highlights

[ui]
bar_background = "rgba(53, 59, 69, 0.8)"  # Panel background
shadow_color = "rgba(0, 0, 0, 0.6)"  # Shadow color
