[dark.background]
main =  "#1e1e1e"  # Main background
alt =  "#2e2e2e"  # Secondary background
dark =  "#121212"  # Darkest background


[dark.text]
main =  "#ffffff"  # Primary text color
secondary =  "#b3b3b3"  # Secondary text color
muted =  "#808080"  # Tertiary text, muted
disabled =  "#b3b3b3"  # Text for disabled elements
muted_light =  "#f5f5f5"  # Light-muted text for hints
muted_dark =  "#808080"  # Dark-muted text


[dark.surface]
disabled =  "#4d4d4d"  # Background for disabled items
neutral =  "#666666"  # Neutral surface for cards, panels
highlight =  "#b3b3b3"  # Selection and highlights


[dark.accent]
light =  "#ffffff"  # Light accent (white)
pink =  "#ff4081"  # Pink accent
purple =  "#9c27b0"  # Purple accent
red =  "#f44336"  # Red for errors and warnings
orange =  "#ff9800"  # Orange for warnings and alerts
yellow =  "#ffeb3b"  # Yellow for highlights
green =  "#4caf50"  # Green for success
teal =  "#009688"  # Teal for information
blue =  "#2196f3"  # Blue for links and actions
light_blue =  "#03a9f4"  # Sky blue accent
lavender =  "#9c27b0"  # Lavender for subtle highlights


[dark.general]
bar_background =  "rgba(46, 46, 46, 0.8)"  # Panel background
shadow_color =  "rgba(0, 0, 0, 0.6)"  # Shadow color


