disabled =  "#b38a8f"  # Disabled text (muted green-gray)
muted_light =  "#a6828a"  # Light-muted text for hints (grayish green)
muted_dark =  "#c3a3ac"  # Dark-muted text (dark greenish-gray)


[light.surface]
