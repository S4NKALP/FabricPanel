[dark.background]
main =  "#2e2a47"  # Main background (deep purple)
alt =  "#3c3251"  # Secondary background (slightly lighter dark purple)
dark =  "#1c1833"  # Darkest background (very deep purple)


[dark.text]
main =  "#dcd0ff"  # Primary text color (light lavender)
secondary =  "#b4a0d5"  # Secondary text color (soft purple)
muted =  "#7e6f95"  # Tertiary text, muted (grayish purple)
disabled =  "#8e7d9f"  # Disabled text (dusty purple-gray)
muted_light =  "#b0a8c0"  # Light-muted text for hints (light purple-gray)
muted_dark =  "#32234a"  # Dark-muted text (deep purple-gray)


[dark.surface]
disabled =  "#5a4e7e"  # Disabled items (muted purple)
neutral =  "#4b3c63"  # Neutral surface for cards, panels (dark purple)
highlight =  "#9c4cbb"  # Selection and highlights (vibrant purple)


[dark.accent]
light =  "#9b59b6"  # Light accent (rich purple)
pink =  "#e91e63"  # Pink accent (vibrant pink)
purple =  "#8e44ad"  # Purple accent (strong purple)
red =  "#e74c3c"  # Red for errors and warnings (soft red)
orange =  "#f39c12"  # Orange for alerts (yellow-orange)
yellow =  "#f1c40f"  # Yellow for highlights (warm yellow)
green =  "#2ecc71"  # Green for success (vibrant green)
teal =  "#1abc9c"  # Teal for information (bright cyan)
blue =  "#3498db"  # Blue for links and actions (bright blue)
light_blue =  "#5dade2"  # Sky blue accent (light blue)
lavender =  "#9b59b6"  # Lavender for subtle highlights (soft purple)


[dark.general]
bar_background =  "rgba(46, 42, 71, 0.9)"  # Panel background (semi-transparent dark purple)
shadow_color =  "rgba(0, 0, 0, 0.5)"  # Shadow color (dark, soft shadows)


